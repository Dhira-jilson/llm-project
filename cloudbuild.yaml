steps:
  # Build the Docker image using explicit Dockerfile
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args: 
      - 'build'
      - '--no-cache'
      - '-t'
      - 'gcr.io/$PROJECT_ID/llm-api:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/llm-api:latest'
      - '-f'
      - 'Dockerfile'
      - '.'
    timeout: 1800s
    waitFor: ['-']

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args: 
      - 'push'
      - 'gcr.io/$PROJECT_ID/llm-api:$SHORT_SHA'
    waitFor: ['build-image']

  # Also push latest tag
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-latest'
    args: 
      - 'push'
      - 'gcr.io/$PROJECT_ID/llm-api:latest'
    waitFor: ['build-image']

images:
  - 'gcr.io/$PROJECT_ID/llm-api:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/llm-api:latest'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: 'ALLOW_LOOSE'

timeout: 1800s
