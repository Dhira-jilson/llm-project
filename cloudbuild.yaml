steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/llm-api:$SHORT_SHA', '-t', 'gcr.io/$PROJECT_ID/llm-api:latest', '.']
    timeout: 1200s

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/llm-api:$SHORT_SHA']

  # Deploy to GKE (if using Kubernetes)
  # - name: 'gcr.io/cloud-builders/kubectl'
  #   args: ['set', 'image', 'deployment/llm-api', 'llm-api=gcr.io/$PROJECT_ID/llm-api:$SHORT_SHA']
  #   env: ['CLOUDSDK_COMPUTE_ZONE=us-central1-a', 'CLOUDSDK_CONTAINER_CLUSTER=my-cluster']

images:
  - 'gcr.io/$PROJECT_ID/llm-api:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/llm-api:latest'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: 1500s
