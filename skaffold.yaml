apiVersion: skaffold/v4beta6
kind: Config
metadata:
  name: llm-project

build:
  # Explicitly use docker builder, not buildpacks
  artifacts:
    - image: gcr.io/PROJECT_ID/llm-api
      docker:
        dockerfile: Dockerfile
        target: ''
  # Disable buildpacks
  tagPolicy:
    gitCommit: {}

deploy:
  kubectl: {}

portForward:
  - resourceType: deployment
    resourceName: llm-api
    port: 8000
    localPort: 8000
